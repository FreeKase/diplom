{% extends "base.html" %}

{% block title %}{{ item.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-5">
            <img src="{{ url_for('static', filename='img/' + item.image) }}" class="img-fluid" alt="{{ item.name }}">
        </div>
        <div class="col-md-7">
            <h1>{{ item.name }}</h1>
            <p class="text-muted">Категория: {{ item.type }}</p>
            <h3 class="text-success">{{ item.price|int }} ₽</h3>
            <hr>
            <h5>Характеристики</h5>
            <p>{{ item.specs }}</p>
            <button class="btn btn-primary" onclick="alert('Добавлено в заявку')">🛒 Добавить в заявку</button>
        </div>
    </div>
</div>
{% endblock %}
