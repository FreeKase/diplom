{% extends "base.html" %}

{% block title %}{{ 'Редактировать' if product else 'Добавить' }} товар{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h2>{{ 'Редактировать' if product else 'Добавить' }} товар</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Название</label>
            <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Тип</label>
            <select name="type" class="form-select">
                <option value="camera" {% if product and product.type=='camera' %}selected{% endif %}>Камера</option>
                <option value="recorder" {% if product and product.type=='recorder' %}selected{% endif %}>Регистратор</option>
                <option value="accessory" {% if product and product.type=='accessory' %}selected{% endif %}>Аксессуар</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Цена (₽)</label>
            <input type="number" name="price" class="form-control" value="{{ product.price|int if product else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Характеристики</label>
            <textarea name="specs" class="form-control" rows="4">{{ product.specs if product else '' }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Имя файла изображения</label>
            <input type="text" name="image" class="form-control" value="{{ product.image if product else 'default.jpg' }}">
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
